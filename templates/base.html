{% load static %}
<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Quick_Teacher2 | Dashboard</title>
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
</head>
<body class="dashboard-layout">
    
    <aside class="sidebar">
        {% include 'partials/sidebar.html' %}
    </aside>

    <main class="content">
        <header class="top-bar">
            <h1>Olá, {{ user.first_name }}</h1>
        </header>
        
        <div class="main-content">
            {% block content %}
            {% endblock %}
        </div>
    </main>
</body>
</html>

<!-- templates/base.html -->
<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Quick_Teacher2</title>
    <link rel="stylesheet" href="{{ STATIC_URL }}css/style.css">
</head>
<body>
    <header>
        <h1>Bem-vindo ao Quick_Teacher2</h1>
        
        {% if user.is_authenticated %}
            <nav>
                <span>Logado como: <strong>{{ user.first_name }}</strong></span>
                
                {% if user.tipo_usuario == 'PROFESSOR' %}
                    <span style="background-color: #dc3545; color: white; padding: 2px 8px; border-radius: 4px;">Professor</span>
                {% else %}
                    <span style="background-color: #28a745; color: white; padding: 2px 8px; border-radius: 4px;">Aluno</span>
                {% endif %}
                
                <form action="{% url 'logout' %}" method="post" style="display:inline;">
    {% csrf_token %}
    <button type="submit" style="background:none; border:none; color:blue; cursor:pointer; text-decoration:underline;">
        Sair
    </button>
</form>
            </nav>
        {% endif %}
    </header>

    <main>
        {% block content %}
        {% endblock %}
    </main>
</body>
</html>

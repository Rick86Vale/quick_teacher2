{% extends 'base.html' %}
{% block content %}
<h1>Olá, Professor!</h1>
<hr>
<h3>Suas Instituições:</h3>
{% if instituicoes %}
    <ul>
        {% for inst in instituicoes %}
            <li>{{ inst.nome }}</li>
        {% endfor %}
    </ul>
{% else %}
    <p>Você ainda não possui instituições cadastradas.</p>
{% endif %}

<a href="{% url 'criar_instituicao' %}" class="btn">Criar nova Instituição</a>
{% endblock %}

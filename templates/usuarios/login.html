{% extends 'base.html' %}

{% block content %}

        {% csrf_token %}
        {{ form.as_p }}

    </form>
    <div class="register-links">
    <p>Ainda não tem cadastro?</p>

    <a href="{% url 'registro_professor' %}">Cadastrar como Professor</a>
    </div>
{% endblock %}

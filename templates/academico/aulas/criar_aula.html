{% extends 'base.html' %}

{% block content %}
<div class="header" style="margin-bottom: 20px;">
    <h2 style="color: #666; font-size: 0.9em; text-transform: uppercase;">Disciplina: {{ disciplina.nome }}</h2>
    <h1>Nova Aula</h1>
</div>

<form method="post" enctype="multipart/form-data">
    {% csrf_token %}
    
    <main>
        <div style="margin-bottom: 15px;">
            <label><strong>Título da Aula:</strong></label>
            {{ form.titulo }}
        </div>

        <div style="margin-bottom: 15px;">
            <label><strong>Conteúdo (Markdown):</strong></label>
            {{ form.conteudo }}
        </div>

        <button type="submit" class="btn btn-success">
            <i class="fas fa-save"></i> Salvar Aula
        </button>
        
        <a href="{% url 'gerenciar_aulas' disciplina.pk %}" class="btn btn-secondary">
            <i class="fas fa-times"></i> Cancelar
        </a>
    </main>
</form>

<script>
function insertAtCursor(text) {
    const textarea = document.querySelector('textarea[name="conteudo"]');
    textarea.value += "\n" + text + "\n";
}
</script>
{% endblock %}

{% extends 'base.html' %}
{% block content %}
<div class="container" style="max-width: 500px; margin: 50px auto; padding: 30px; background: #fff; border-radius: 12px; border: 1px solid #eee;">
    <h2>Confirmar Exclusão</h2>
    <p>Tem certeza que deseja excluir o evento: <strong>"{{ evento.titulo }}"</strong>?</p>
    
    <form method="post">
        {% csrf_token %}
        <div style="display: flex; gap: 10px; margin-top: 20px;">
            <button type="submit" class="btn btn-danger">Sim, excluir permanentemente</button>
            <a href="{% url 'listar_avisos' turma.pk %}" class="btn btn-secondary">Cancelar</a>
        </div>
    </form>
</div>
{% endblock %}

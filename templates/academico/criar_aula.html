{% extends 'base.html' %}

{% block content %}
<div class="header" style="margin-bottom: 20px;">
    <h2 style="color: #666; font-size: 0.9em; text-transform: uppercase;">Disciplina: {{ disciplina.nome }}</h2>
    <h1>Nova Aula</h1>
</div>

<form method="post" enctype="multipart/form-data" style="display: flex; gap: 30px; align-items: flex-start;">
    {% csrf_token %}
    
    <main style="flex: 3;">
        <div style="margin-bottom: 15px;">
            <label><strong>Título da Aula:</strong></label>
            {{ form.titulo }}
        </div>

        <div style="margin-bottom: 15px;">
            <label><strong>Conteúdo (Markdown):</strong></label>
            {{ form.conteudo }}
        </div>

        <button type="submit" style="background: #28a745; color: white; padding: 12px 24px; border: none; border-radius: 4px; cursor: pointer; font-weight: bold;">
            Salvar Aula
        </button>
        <a href="{% url 'gerenciar_aulas' disciplina.pk %}" style="margin-left: 15px; color: #555;">Cancelar</a>
    </main>

    
</form>

<script>
function insertAtCursor(text) {
    const textarea = document.querySelector('textarea[name="conteudo"]');
    textarea.value += "\n" + text + "\n";
}
</script>
{% endblock %}

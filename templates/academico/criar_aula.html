<!--templates/academico/criar_aula.html-->

{% extends 'base.html' %}
{% block content %}
<div class="header" style="margin-bottom: 20px;">
    <h2 style="color: #666; font-size: 0.9em; text-transform: uppercase;">Disciplina: {{ disciplina.nome }}</h2>
    <h1>Nova Aula</h1>
</div>

<div class="form-container" style="max-width: 900px;">
    <form method="post" enctype="multipart/form-data">
        {% csrf_token %}
        
        <div style="margin-bottom: 15px;">
            <label>Título da Aula:</label>
            {{ form.titulo }}
        </div>

        <div style="margin-bottom: 15px;">
            <label>Conteúdo (Markdown):</label>
            {{ form.conteudo }}
        </div>

        <div class="extras" style="margin-bottom: 20px; display: flex; gap: 10px;">
            <button type="button" onclick="insertAtCursor('![Imagem](url_aqui)')" class="btn-extra">Inserir Imagem</button>
            <button type="button" onclick="insertAtCursor('[Vídeo](url_aqui)')" class="btn-extra">Inserir Vídeo</button>
        </div>

        <script>
        function insertAtCursor(text) {
            const textarea = document.querySelector('textarea[name="conteudo"]');
            textarea.value += "\n" + text + "\n";
        }
        </script>

        <button type="submit" style="background: #28a745; color: white; padding: 12px 24px; border: none; border-radius: 4px; cursor: pointer; font-weight: bold;">
            Salvar Aula
        </button>
        <a href="{% url 'gerenciar_aulas' disciplina.pk %}" style="margin-left: 15px; color: #555;">Cancelar</a>
    </form>
</div>
{% endblock %}

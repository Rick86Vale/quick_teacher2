{% extends 'base.html' %}

{% block content %}
<div style="max-width: 500px; margin: 40px auto; padding: 20px; background: white; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1);">
    <h2><i class="fas fa-book-reader"></i> Selecione a Disciplina</h2>
    <p>Escolha em qual disciplina você deseja criar a nova aula:</p>
    
    <form method="post">
        {% csrf_token %}
        <div style="margin-bottom: 20px;">
            <select name="disciplina_id" required style="width: 100%; padding: 12px; border-radius: 6px; border: 1px solid #ccc; font-size: 1em;">
                {% for d in disciplinas %}
                    <option value="{{ d.pk }}">{{ d.nome }}</option>
                {% empty %}
                    <option disabled>Nenhuma disciplina encontrada</option>
                {% endfor %}
            </select>
        </div>
        
        <button type="submit" class="btn btn-primary" style="width: 100%;">
            <i class="fas fa-arrow-right"></i> Próximo
        </button>
    </form>
</div>
{% endblock %}

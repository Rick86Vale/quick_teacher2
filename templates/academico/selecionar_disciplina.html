{% extends 'base.html' %}

{% block content %}
<div style="max-width: 500px; margin: 40px auto; padding: 20px; background: white; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1);">
    <h2>Selecione a Disciplina</h2>
    <p>Escolha em qual disciplina você deseja criar a nova aula:</p>
    
    <form method="post">
        {% csrf_token %}
        <div style="margin-bottom: 20px;">
            <select name="disciplina_id" required style="width: 100%; padding: 10px; border-radius: 4px; border: 1px solid #ccc;">
                {% for d in disciplinas %}
                    <option value="{{ d.pk }}">{{ d.nome }}</option>
                {% empty %}
                    <option disabled>Nenhuma disciplina encontrada</option>
                {% endfor %}
            </select>
        </div>
        <button type="submit" class="btn-primary" style="width: 100%; padding: 10px;">Próximo</button>
    </form>
</div>
{% endblock %}

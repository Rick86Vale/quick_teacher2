{% extends 'base.html' %}
{% block content %}
<div class="container" style="max-width: 500px; margin: 50px auto;">
    <h2>Confirmar Exclusão</h2>
    <p>Tem certeza que deseja excluir o aviso: <strong>"{{ aviso.titulo }}"</strong>?</p>
    
    <form method="post">
        {% csrf_token %}
        <button type="submit" class="btn btn-danger">Sim, excluir permanentemente</button>
        <a href="{% url 'listar_avisos' aviso.turma.pk %}" class="btn btn-secondary">Cancelar</a>
    </form>
</div>
{% endblock %}

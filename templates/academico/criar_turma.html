{% extends 'base.html' %}
{% block content %}
<h2>{{ form.instance.pk|yesno:"Editar Turma,Nova Turma" }}</h2>

<form method="post" class="card">
    {% csrf_token %}
    {{ form.as_p }} <button type="submit" class="btn-primary">Salvar Turma</button>
    <a href="{% url 'listar_turmas' %}">Cancelar</a>
</form>
{% endblock %}

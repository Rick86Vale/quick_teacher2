{% extends 'base.html' %}

{% block content %}
<div class="header-content">
    <h1>Aulas de: {{ disciplina.nome }}</h1>
    <a href="{% url 'listar_disciplinas' %}">← Voltar para minhas disciplinas</a>
</div>

<div class="content-body" style="margin-top: 20px;">
    <table style="width: 100%; border-collapse: collapse; background: white;">
        <thead>
            <tr style="background: #f4f4f4;">
                <th style="padding: 10px; text-align: left;">Ordem</th>
                <th style="padding: 10px; text-align: left;">Título da Aula</th>
                <th style="padding: 10px; text-align: left;">Ações</th>
            </tr>
        </thead>
        <tbody>
            {% for aula in aulas %}
            <tr>
                <td style="padding: 10px;">{{ aula.ordem }}</td>
                <td style="padding: 10px;">{{ aula.titulo }}</td>
                <td style="padding: 10px;">
                    <a href="#">Editar</a> | <a href="#">Excluir</a>
                </td>
            </tr>
            {% empty %}
            <tr>
                <td colspan="3" style="padding: 20px; text-align: center;">Nenhuma aula cadastrada ainda.</td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</div>
{% endblock %}

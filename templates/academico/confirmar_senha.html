{% extends 'base.html' %}

{% block content %}
<div style="max-width: 500px; margin: 50px auto; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.05);">
    <h2 style="color: #e53e3e; margin-bottom: 20px;">Confirmação de Segurança</h2>
    
    <p style="color: #4a5568; margin-bottom: 20px;">
        Esta é uma ação destrutiva. Por favor, digite sua senha atual para confirmar a exclusão.
    </p>

    <!-- O formulário envia o POST com o campo 'password_confirm' esperado pela função -->
    <form method="post">
        {% csrf_token %}
        
        <div style="margin-bottom: 20px;">
            <label for="password_confirm" style="display: block; margin-bottom: 8px; font-weight: 500;">Sua Senha:</label>
            <input type="password" name="password_confirm" id="password_confirm" required 
                   style="width: 100%; padding: 10px; border: 1px solid #cbd5e0; border-radius: 6px; box-sizing: border-box;">
        </div>

        <div style="display: flex; gap: 10px; justify-content: flex-end;">
            <a href="javascript:history.back()" class="btn btn-secondary" style="text-decoration: none; padding: 10px 15px; background: #e2e8f0; color: #4a5568; border-radius: 6px;">Cancelar</a>
            <button type="submit" class="btn btn-danger" style="padding: 10px 15px; background: #e53e3e; color: white; border: none; border-radius: 6px; cursor: pointer;">Confirmar Exclusão</button>
        </div>
    </form>
</div>

<script>
    // Monitora se o cookie de download foi criado pelo backend
    setInterval(function() {
        if (document.cookie.indexOf('download_backup_realizado=true') !== -1) {
            // Remove o cookie para evitar loops
            document.cookie = 'download_backup_realizado=; expires=Thu, 01 Jan 1970 00:00:00 UTC; path=/;';
            // Redireciona de volta para a lista de disciplinas
            window.location.href = "{% url 'listar_disciplinas' %}";
        }
    }, 500);
</script>

{% endblock %}

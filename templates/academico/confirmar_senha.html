{% extends 'base.html' %}
{% block content %}
<div class="container" style="max-width: 500px; margin: 50px auto; padding: 20px; border: 1px solid #ddd; border-radius: 8px;">
    <h2>Confirmar Exclusão</h2>
    <div class="alert alert-warning" style="padding: 20px; background: #fff3cd; border: 1px solid #ffeeba; border-radius: 8px;">
        <p>Você está prestes a excluir permanentemente: <strong>{{ item.nome }}</strong></p>
        <p style="font-size: 0.9em; color: #856404;">O sistema baixará um backup em JSON antes da exclusão.</p>
    </div>
    
    <h2>Autenticação Necessária</h2>
    <form method="post" action="{% url 'excluir_disciplina' pk %}" id="form-excluir">
        {% csrf_token %}
        <div style="margin-bottom: 15px;">
            <input type="password" name="password_confirm" class="form-control" required placeholder="Digite sua senha" style="width: 100%; padding: 10px;">
        </div>
        <button type="submit" class="btn btn-danger" style="width: 100%; padding: 10px;">Confirmar Exclusão e Baixar Backup</button>
        <a href="{% url 'listar_disciplinas' %}" class="btn btn-secondary" style="display: block; text-align: center; margin-top: 10px;">Cancelar</a>
    </form>
</div>

<script>
    // Após o clique, aguarda um instante e redireciona para a listagem
    document.getElementById('form-excluir').addEventListener('submit', function() {
        setTimeout(function() {
            window.location.href = "{% url 'listar_disciplinas' %}";
        }, 1500); 
    });
</script>
{% endblock %}

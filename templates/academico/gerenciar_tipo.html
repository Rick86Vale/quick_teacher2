{% extends 'base.html' %}
{% block content %}
<div style="padding: 20px;">
    <h2>Gerenciar {{ tipo }}: {{ aula.titulo }}</h2>
    
    <form method="post" enctype="multipart/form-data">
        {% csrf_token %}
        {{ formset.management_form }}
        
        <div style="display: flex; flex-direction: column; gap: 15px;">
            {% for form in formset %}
                <div class="card" style="padding: 15px; border: 1px solid #ccc; border-radius: 8px;">
                    {{ form.as_p }}
                </div>
            {% endfor %}
        </div>

        <div style="margin-top: 20px;">
            <button type="submit" class="btn-primary">Salvar {{ tipo }}s</button>
            <a href="{% url 'menu_recursos' aula.pk %}" class="btn-secondary">Cancelar</a>
        </div>
    </form>
</div>
{% endblock %}
